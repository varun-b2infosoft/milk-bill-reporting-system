kind = "web"
previewPath = "/"
title = "Milk Bill Reporting System"
version = "1.0.0"
id = "artifacts/milk-bill-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25473

[services.development]
run = "pnpm --filter @workspace/milk-bill-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/milk-bill-dashboard", "run", "build" ]
publicDir = "artifacts/milk-bill-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25473"
BASE_PATH = "/"
